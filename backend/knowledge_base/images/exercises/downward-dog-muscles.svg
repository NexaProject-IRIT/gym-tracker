  <!-- Right calf back -->
  <rect x="518" y="362" width="30" height="50" rx="8" class="inactive"/>

  <!-- Legend -->
  <rect x="270" y="370" width="14" height="14" rx="3" class="primary"/>
  <text x="290" y="382" class="label" style="text-anchor:start">Основные</text>
  <rect x="370" y="370" width="14" height="14" rx="3" class="secondary"/>
  <text x="390" y="382" class="label" style="text-anchor:start">Вспомогательные</text>

</svg>