  <rect x="130" y="172" width="20" height="50" rx="5" class="inactive"/>
  <!-- Right oblique -->
  <rect x="190" y="172" width="20" height="50" rx="5" class="inactive"/>
  <!-- Hip flexors -->
  <rect x="140" y="232" width="38" height="25" rx="5" class="inactive"/>
  <!-- Left quad -->
  <rect x="128" y="257" width="38" height="80" rx="8" class="inactive"/>
  <!-- Right quad -->
  <rect x="174" y="257" width="38" height="80" rx="8" class="inactive"/>
  <!-- Left adductor -->
