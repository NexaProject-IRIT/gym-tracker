<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%">
  <title>Собака мордой вниз — карта мышц</title>
  <style>
    .label { font: 500 13px sans-serif; fill: #94a3b8; text-anchor: middle; }
    .bg { fill: #1e2330; }
    .inactive { fill: #2d3748; stroke: #3d4a5c; stroke-width: 0.5; }
    .primary { fill: #e85d04; stroke: #c44b00; stroke-width: 0.5; }
    .secondary { fill: #6ee7b7; stroke: #4dbb93; stroke-width: 0.5; }
  </style>

  <!-- Front body -->
  <text x="170" y="30" class="label">Вид спереди</text>
  <!-- Head -->
  <ellipse cx="170" cy="65" rx="28" ry="32" class="inactive"/>
  <!-- Neck -->
  <rect x="158" y="94" width="24" height="18" rx="4" class="inactive"/>
  <!-- Chest -->
  <rect x="130" y="112" width="80" height="55" rx="6" class="inactive"/>
  <!-- Left shoulder -->
  <ellipse cx="118" cy="130" rx="18" ry="22" class="inactive"/>
  <!-- Right shoulder -->
  <ellipse cx="222" cy="130" rx="18" ry="22" class="inactive"/>
  <!-- Left bicep -->
  <rect x="98" y="152" width="22" height="50" rx="8" class="inactive"/>
  <!-- Right bicep -->
  <rect x="220" y="152" width="22" height="50" rx="8" class="inactive"/>
  <!-- Left forearm -->
  <rect x="100" y="205" width="18" height="45" rx="7" class="inactive"/>
  <!-- Right forearm -->
  <rect x="222" y="205" width="18" height="45" rx="7" class="inactive"/>
  <!-- Abs -->
  <rect x="148" y="167" width="44" height="65" rx="5" class="inactive"/>
