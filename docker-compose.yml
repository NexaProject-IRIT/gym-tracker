services:
  db:
    image: postgres:15
    container_name: gym_postgres
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
      POSTGRES_DB: gym_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: gym_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://gym_user:gym_password@db:5432/gym_db
      - DB_NAME=gym_db
      - DB_USER=gym_user
      - DB_PASSWORD=gym_password
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - LLM_PROVIDER=gigachat
      - GIGACHAT_AUTH_KEY=MDE5Y2I5ZGQtOWY2OS03NDdhLWIxMjAtMTVmOTRhMTE1MGYwOmQxMGU1NzNlLTlkYjMtNDBiYi1iMDIyLTQ5MjQyOWE2MDJiZQ==
      - GIGACHAT_SCOPE=GIGACHAT_API_PERS
      - GIGACHAT_MODEL=GigaChat
      - GIGACHAT_VERIFY_SSL=false
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py sync_knowledge_base &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    depends_on:
      backend:
        condition: service_started
    build: ./frontend
    container_name: gym_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: